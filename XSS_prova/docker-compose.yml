services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xsslab
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: xss_prova_app:latest
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: xsslab
      DB_USER: root
      DB_PASS: root
    volumes:
      - ./app/index.php:/var/www/html/index.php
      - ./app/save.php:/var/www/html/save.php
      - ./app/view.php:/var/www/html/view.php
      - ./app/trigger.php:/var/www/html/trigger.php
      - ./db/db.php:/var/www/html/db.php
    depends_on:
      db:
        condition: service_healthy