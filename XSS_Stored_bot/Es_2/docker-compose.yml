services:
  # PHP/Apache web application
  web:
    build:
      context: ./web          
    environment:
      FLAG: "${FLAG}"
    expose:
      - "80"
    ports:
      - "${PORT}:80"           
    networks:
      - ctf-net
    restart: unless-stopped

  # Puppeteer bot (headless Chromium)
  bot:
    build:
      context: ./bot
    environment:
      TARGET_URL: "http://web/view.php"
      FLAG: "${FLAG}"
      INTERVAL: "15000"
    networks:
      - ctf-net
    depends_on:
      - web
    restart: unless-stopped

networks:
  ctf-net:
    driver: bridge